<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OOCSS Ejemplo 2</title>
        <link rel="stylesheet" href="assets/css/style.css">
        <link rel="stylesheet" href="assets/css/media.css">
    </head>
    <body>
        <div class="site-header">
            <div class="globalwidth">
                <div class="media">
                    <div class="media__img"></div>
                    <div class="media__body">
                        <p class="media__title">Cabecera del sitio</p>
                        <p class="media__text">Mismo objeto .media dentro del
                            header</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="site-main">
            <div class="globalwidth">
                <div class="row">
                    <div class="media">
                        <div class="media__img"></div>
                        <div class="media__body">
                            <p class="media__title">Artículo 1</p>
                            <p class="media__text">Reutilizado en el contenido
                                principal.</p>
                        </div>
                    </div>
                    <div class="media">
                        <div class="media__img"></div>
                        <div class="media__body">
                            <p class="media__title">Artículo 2</p>
                            <p class="media__text">Sin estilos especiales por
                                contenedor.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="site-footer">
            <div class="globalwidth">
                <div class="media">
                    <div class="media__img"></div>
                    <div class="media__body">
                        <p class="media__title">Pie de
                            página</p>
                        <p class="media__text">El mismo .media,
                            otra vez.</p></div>
                </div>
            </div>
        </div>
    </body>
</html>
